name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Run all jobs'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Path-filtered deploy — only changed services are redeployed on each push.
# workflow_dispatch with force_all=true deploys everything (full redeploy).
# workflow_dispatch with force_all=false (default) still uses path filtering.
#
# Deploy order (dependency graph):
#
#   changes (detect)
#       └──▶ migrate-db
#                └──▶ deploy-auth  ──┐
#                └──▶ deploy-page  ──┤
#                └──▶ deploy-block ──┤──▶ deploy-gateway ──▶ deploy-web
#                └──▶ deploy-file  ──┤
#                └──▶ deploy-hocus ──┘
#
# Path → job mapping (each filter also triggers on shared packages):
#
#   packages/db/**                    → migrate-db + all DB-using services
#   packages/shared/**                → auth, page, block, file, gateway
#   packages/ui/**                    → web
#   services/auth-service/**          → deploy-auth
#   services/page-service/**          → deploy-page
#   services/block-service/**         → deploy-block
#   services/file-service/**          → deploy-file
#   services/hocuspocus-service/worker/** → deploy-hocus
#   apps/api-gateway/**               → deploy-gateway
#   apps/web/**                       → deploy-web
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 0a. Detect changed paths ──────────────────────────────────────────────
  #
  # Uses dorny/paths-filter to emit boolean outputs per service.
  # On workflow_dispatch every output is forced to 'true' so all jobs run.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      db:       ${{ (github.event_name == 'workflow_dispatch' && inputs.force_all) && 'true' || steps.filter.outputs.db }}
      auth:     ${{ (github.event_name == 'workflow_dispatch' && inputs.force_all) && 'true' || steps.filter.outputs.auth }}
      page:     ${{ (github.event_name == 'workflow_dispatch' && inputs.force_all) && 'true' || steps.filter.outputs.page }}
      block:    ${{ (github.event_name == 'workflow_dispatch' && inputs.force_all) && 'true' || steps.filter.outputs.block }}
      file:     ${{ (github.event_name == 'workflow_dispatch' && inputs.force_all) && 'true' || steps.filter.outputs.file }}
      partykit: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_all) && 'true' || steps.filter.outputs.partykit }}
      gateway:  ${{ (github.event_name == 'workflow_dispatch' && inputs.force_all) && 'true' || steps.filter.outputs.gateway }}
      web:      ${{ (github.event_name == 'workflow_dispatch' && inputs.force_all) && 'true' || steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            db:
              - 'packages/db/**'
            auth:
              - 'services/auth-service/**'
              - 'packages/shared/**'
              - 'packages/db/**'
            page:
              - 'services/page-service/**'
              - 'packages/shared/**'
              - 'packages/db/**'
            block:
              - 'services/block-service/**'
              - 'packages/shared/**'
              - 'packages/db/**'
            file:
              - 'services/file-service/**'
              - 'packages/shared/**'
              - 'packages/db/**'
            partykit:
              - 'services/partykit-service/**'
            gateway:
              - 'apps/api-gateway/**'
              - 'packages/shared/**'
            web:
              - 'apps/web/**'
              - 'packages/ui/**'

  # ── 0b. DB migrations ─────────────────────────────────────────────────────
  #
  # Runs only when packages/db/** changes (schema/migrations) or on full
  # workflow_dispatch. Must complete before any DB-backed service deploys.
  migrate-db:
    name: Run database migrations
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.db == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        working-directory: packages/db
        run: pnpm migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Helper: "ok-to-deploy" condition ─────────────────────────────────────
  #
  # All service jobs below share the same pattern:
  #
  #   needs: [changes, migrate-db]
  #   if: >-
  #     always() && !cancelled() &&
  #     needs.changes.outputs.<service> == 'true' &&
  #     (needs.migrate-db.result == 'success' || needs.migrate-db.result == 'skipped')
  #
  # `always()` is required so the job still evaluates when migrate-db is
  # skipped (GitHub skips dependents of skipped jobs by default).
  # Checking migrate-db.result ensures we don't deploy against a broken DB.

  # ── 1. auth-service ───────────────────────────────────────────────────────
  deploy-auth:
    name: Deploy auth-service → CF Workers
    runs-on: ubuntu-latest
    needs: [changes, migrate-db]
    if: >-
      always() && !cancelled() &&
      needs.changes.outputs.auth == 'true' &&
      (needs.migrate-db.result == 'success' || needs.migrate-db.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/auth-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            JWT_REFRESH_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          JWT_SECRET:         ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          GATEWAY_ORIGIN:     ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:      ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS:    ${{ vars.ALLOWED_ORIGINS }}

  # ── 2. page-service ───────────────────────────────────────────────────────
  deploy-page:
    name: Deploy page-service → CF Workers
    runs-on: ubuntu-latest
    needs: [changes, migrate-db]
    if: >-
      always() && !cancelled() &&
      needs.changes.outputs.page == 'true' &&
      (needs.migrate-db.result == 'success' || needs.migrate-db.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/page-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            INTERNAL_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JWT_SECRET:      ${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          GATEWAY_ORIGIN:  ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:   ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}

  # ── 3. block-service ──────────────────────────────────────────────────────
  deploy-block:
    name: Deploy block-service → CF Workers
    runs-on: ubuntu-latest
    needs: [changes, migrate-db]
    if: >-
      always() && !cancelled() &&
      needs.changes.outputs.block == 'true' &&
      (needs.migrate-db.result == 'success' || needs.migrate-db.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/block-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            INTERNAL_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JWT_SECRET:      ${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          GATEWAY_ORIGIN:  ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:   ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}

  # ── 4. file-service ───────────────────────────────────────────────────────
  deploy-file:
    name: Deploy file-service → CF Workers
    runs-on: ubuntu-latest
    needs: [changes, migrate-db]
    if: >-
      always() && !cancelled() &&
      needs.changes.outputs.file == 'true' &&
      (needs.migrate-db.result == 'success' || needs.migrate-db.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/file-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            INTERNAL_SECRET
            CLOUDINARY_CLOUD_NAME
            CLOUDINARY_API_KEY
            CLOUDINARY_API_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          JWT_SECRET:            ${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET:       ${{ secrets.INTERNAL_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GATEWAY_ORIGIN:        ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:         ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS:       ${{ vars.ALLOWED_ORIGINS }}

  # ── 5. partykit-service ───────────────────────────────────────────────────
  #
  # No DB dependency — only deploys when partykit server source changes.
  # Required GitHub Secret: PARTYKIT_TOKEN (from partykit.io dashboard)
  # Required GitHub Variable: AUTH_SERVICE_URL (deployed auth-service URL)
  deploy-partykit:
    name: Deploy partykit-service → PartyKit
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.partykit == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to PartyKit
        working-directory: services/partykit-service
        run: npx partykit deploy
        env:
          PARTYKIT_TOKEN:    ${{ secrets.PARTYKIT_TOKEN }}
          PARTYKIT_LOGIN:   ${{ secrets.PARTYKIT_LOGIN }}
          AUTH_SERVICE_URL:  ${{ vars.AUTH_SERVICE_URL }}
          AUTH_REQUIRED:     ${{ vars.AUTH_REQUIRED }}

  # ── 6. api-gateway ────────────────────────────────────────────────────────
  #
  # Waits for all upstream services (success OR skipped — not failed).
  # Only deploys when gateway code or packages/shared changes.
  deploy-gateway:
    name: Deploy api-gateway → CF Workers
    runs-on: ubuntu-latest
    needs: [changes, deploy-auth, deploy-page, deploy-block, deploy-file, deploy-partykit]
    if: >-
      always() && !cancelled() &&
      needs.changes.outputs.gateway == 'true' &&
      needs.deploy-auth.result     != 'failure' &&
      needs.deploy-page.result     != 'failure' &&
      needs.deploy-block.result    != 'failure' &&
      needs.deploy-file.result     != 'failure' &&
      needs.deploy-partykit.result != 'failure'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: apps/api-gateway
          secrets: |
            DATABASE_URL
            JWT_SECRET
            INTERNAL_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JWT_SECRET:      ${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          GATEWAY_ORIGIN:  ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:   ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}

  # ── 7. web → Vercel ───────────────────────────────────────────────────────
  #
  # Waits for gateway (success OR skipped — not failed).
  # Only deploys when apps/web/** or packages/ui/** changes.
  #
  # Required GitHub Secrets:
  #   VERCEL_TOKEN      — from vercel.com/account/tokens
  #   VERCEL_ORG_ID     — from .vercel/project.json after `vercel link`
  #   VERCEL_PROJECT_ID — from .vercel/project.json after `vercel link`
  #
  # Required GitHub Variables:
  #   PUBLIC_API_GATEWAY_URL — e.g. https://notion-clone-api.YOUR-SUBDOMAIN.workers.dev
  #   PUBLIC_HOCUSPOCUS_URL  — e.g. wss://hocuspocus-proxy.YOUR-SUBDOMAIN.workers.dev
  #   API_GATEWAY_URL        — same as PUBLIC_API_GATEWAY_URL (used server-side by SvelteKit)
  deploy-web:
    name: Deploy web → Vercel
    runs-on: ubuntu-latest
    needs: [changes, deploy-gateway]
    if: >-
      always() && !cancelled() &&
      needs.changes.outputs.web == 'true' &&
      needs.deploy-gateway.result != 'failure'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        working-directory: apps/web
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        working-directory: apps/web
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          PUBLIC_API_GATEWAY_URL: ${{ vars.PUBLIC_API_GATEWAY_URL }}
          PUBLIC_HOCUSPOCUS_URL:  ${{ vars.PUBLIC_HOCUSPOCUS_URL }}
          API_GATEWAY_URL:        ${{ vars.API_GATEWAY_URL }}

      - name: Deploy to Vercel
        working-directory: apps/web
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
