name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Deploy order:
#
#   migrate-db
#       └──▶ deploy-auth  ──┐
#       └──▶ deploy-page  ──┤
#       └──▶ deploy-block ──┤──▶ deploy-gateway ──▶ deploy-web
#       └──▶ deploy-file  ──┤
#       └──▶ deploy-hocus ──┘
#
# Services that don't depend on each other run in parallel.
# Gateway waits for all upstream services.
# Web (Cloudflare Pages) waits for gateway + hocuspocus-proxy to be live.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 0. DB migrations ─────────────────────────────────────────────────────
  migrate-db:
    name: Run database migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        working-directory: packages/db
        run: pnpm migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 1. auth-service ───────────────────────────────────────────────────────
  deploy-auth:
    name: Deploy auth-service → CF Workers
    runs-on: ubuntu-latest
    needs: [migrate-db]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/auth-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            JWT_REFRESH_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          JWT_SECRET:         ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          GATEWAY_ORIGIN:     ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:      ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS:    ${{ vars.ALLOWED_ORIGINS }}

  # ── 2. page-service ───────────────────────────────────────────────────────
  deploy-page:
    name: Deploy page-service → CF Workers
    runs-on: ubuntu-latest
    needs: [migrate-db]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/page-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            INTERNAL_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JWT_SECRET:      ${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          GATEWAY_ORIGIN:  ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:   ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}

  # ── 3. block-service ──────────────────────────────────────────────────────
  deploy-block:
    name: Deploy block-service → CF Workers
    runs-on: ubuntu-latest
    needs: [migrate-db]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/block-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            INTERNAL_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JWT_SECRET:      ${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          GATEWAY_ORIGIN:  ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:   ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}

  # ── 4. file-service ───────────────────────────────────────────────────────
  deploy-file:
    name: Deploy file-service → CF Workers
    runs-on: ubuntu-latest
    needs: [migrate-db]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/file-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            INTERNAL_SECRET
            CLOUDINARY_CLOUD_NAME
            CLOUDINARY_API_KEY
            CLOUDINARY_API_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          JWT_SECRET:            ${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET:       ${{ secrets.INTERNAL_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GATEWAY_ORIGIN:        ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:         ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS:       ${{ vars.ALLOWED_ORIGINS }}

  # ── 5. hocuspocus-proxy ───────────────────────────────────────────────────
  #
  # Thin CF Worker that proxies HTTP + WebSocket traffic to the real
  # hocuspocus Node.js server (Replit VM / Fly.io / Railway / etc.).
  #
  # Required secret:
  #   HOCUSPOCUS_BACKEND_URL — public HTTPS URL of the backend server,
  #                            e.g. https://your-vm.replit.app
  #
  # The proxy worker itself has NO database dependency, so it can deploy
  # in parallel with the other backend services.
  deploy-hocus:
    name: Deploy hocuspocus-proxy → CF Workers
    runs-on: ubuntu-latest
    needs: [migrate-db]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/hocuspocus-service/worker
          secrets: |
            HOCUSPOCUS_BACKEND_URL
        env:
          HOCUSPOCUS_BACKEND_URL: ${{ secrets.HOCUSPOCUS_BACKEND_URL }}

  # ── 6. api-gateway ────────────────────────────────────────────────────────
  #       Runs after all upstream services are live.
  deploy-gateway:
    name: Deploy api-gateway → CF Workers
    runs-on: ubuntu-latest
    needs: [deploy-auth, deploy-page, deploy-block, deploy-file, deploy-hocus]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: apps/api-gateway
          secrets: |
            DATABASE_URL
            JWT_SECRET
            INTERNAL_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JWT_SECRET:      ${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          GATEWAY_ORIGIN:  ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:   ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}

  # ── 7. web → Vercel ───────────────────────────────────────────────────────
  #
  # Builds the SvelteKit app with @sveltejs/adapter-vercel and deploys to
  # Vercel production. Runs after gateway is live so PUBLIC_API_GATEWAY_URL
  # and PUBLIC_HOCUSPOCUS_URL are baked in at build time.
  #
  # Required GitHub Secrets:
  #   VERCEL_TOKEN      — from vercel.com/account/tokens
  #   VERCEL_ORG_ID     — from .vercel/project.json after `vercel link`
  #   VERCEL_PROJECT_ID — from .vercel/project.json after `vercel link`
  #
  # Required GitHub Variables:
  #   PUBLIC_API_GATEWAY_URL — e.g. https://notion-clone-api.YOUR-SUBDOMAIN.workers.dev
  #   PUBLIC_HOCUSPOCUS_URL  — e.g. wss://hocuspocus-proxy.YOUR-SUBDOMAIN.workers.dev
  #   API_GATEWAY_URL        — same as PUBLIC_API_GATEWAY_URL (used server-side by SvelteKit)
  deploy-web:
    name: Deploy web → Vercel
    runs-on: ubuntu-latest
    needs: [deploy-gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        working-directory: apps/web
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        working-directory: apps/web
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          PUBLIC_API_GATEWAY_URL: ${{ vars.PUBLIC_API_GATEWAY_URL }}
          PUBLIC_HOCUSPOCUS_URL:  ${{ vars.PUBLIC_HOCUSPOCUS_URL }}
          API_GATEWAY_URL:        ${{ vars.API_GATEWAY_URL }}

      - name: Deploy to Vercel
        working-directory: apps/web
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
