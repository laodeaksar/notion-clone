name: Deploy Services to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 0. migrate-db ────────────────────────────────────────────────────────────
  migrate-db:
    name: Run database migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        working-directory: packages/db
        run: pnpm migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 1. auth-service ──────────────────────────────────────────────────────────
  deploy-auth:
    name: Deploy auth-service
    runs-on: ubuntu-latest
    needs: [migrate-db]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy auth-service
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:       ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:      ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: services/auth-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            JWT_REFRESH_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          JWT_SECRET:         ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          GATEWAY_ORIGIN:     ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:      ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS:    ${{ vars.ALLOWED_ORIGINS }}

  # ── 2. page-service ──────────────────────────────────────────────────────────
  deploy-page:
    name: Deploy page-service
    runs-on: ubuntu-latest
    needs: [migrate-db]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy page-service
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/page-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JWT_SECRET:      ${{ secrets.JWT_SECRET }}
          GATEWAY_ORIGIN:  ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:   ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}

  # ── 3. block-service ─────────────────────────────────────────────────────────
  deploy-block:
    name: Deploy block-service
    runs-on: ubuntu-latest
    needs: [migrate-db]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy block-service
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/block-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JWT_SECRET:      ${{ secrets.JWT_SECRET }}
          GATEWAY_ORIGIN:  ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:   ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}

  # ── 4. file-service ──────────────────────────────────────────────────────────
  deploy-file:
    name: Deploy file-service
    runs-on: ubuntu-latest
    needs: [migrate-db]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy file-service
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: services/file-service
          secrets: |
            DATABASE_URL
            JWT_SECRET
            CLOUDINARY_CLOUD_NAME
            CLOUDINARY_API_KEY
            CLOUDINARY_API_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          JWT_SECRET:            ${{ secrets.JWT_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GATEWAY_ORIGIN:        ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:         ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS:       ${{ vars.ALLOWED_ORIGINS }}

  # ── 5. api-gateway ───────────────────────────────────────────────────────────
  deploy-gateway:
    name: Deploy api-gateway
    runs-on: ubuntu-latest
    needs: [deploy-auth, deploy-page, deploy-block, deploy-file]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy api-gateway
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager:   pnpm
          workingDirectory: apps/api-gateway
          secrets: |
            DATABASE_URL
            JWT_SECRET
            GATEWAY_ORIGIN
            AUTH_REQUIRED
            ALLOWED_ORIGINS
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JWT_SECRET:      ${{ secrets.JWT_SECRET }}
          GATEWAY_ORIGIN:  ${{ vars.GATEWAY_ORIGIN }}
          AUTH_REQUIRED:   ${{ vars.AUTH_REQUIRED }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
