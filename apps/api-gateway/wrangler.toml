name = "notion-clone-api-gateway"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ══════════════════════════════════════════════════════════════════════════════
# CARA DEPLOY KE CLOUDFLARE WORKERS
# ══════════════════════════════════════════════════════════════════════════════
#
# Jalankan perintah di bawah ini dari folder apps/api-gateway/:
#
#   1. Login ke Cloudflare:
#        pnpm exec wrangler login
#
#   2. Buat KV namespace untuk rate limiting:
#        pnpm exec wrangler kv namespace create RATE_LIMIT_KV
#      → Salin "id" dari output, tempel ke [[kv_namespaces]] di bawah.
#
#   3. Simpan JWT secret (jangan ditulis di file ini):
#        pnpm exec wrangler secret put JWT_SECRET
#
#   4. Edit bagian [vars] di bawah — isi URL publik microservices kamu.
#
#   5. Deploy:
#        pnpm exec wrangler deploy
#
# ══════════════════════════════════════════════════════════════════════════════

# ── KV Namespace untuk Rate Limiting ──────────────────────────────────────────
# Jalankan: pnpm exec wrangler kv namespace create RATE_LIMIT_KV
# Lalu tempel id-nya di bawah (ganti "GANTI-DENGAN-ID-DARI-WRANGLER").
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id      = "la_ode_aksar"

# ── Environment Variables ──────────────────────────────────────────────────────
# Cloudflare Workers tidak bisa menjangkau `localhost`.
# Ganti nilai di bawah dengan URL publik dari setiap microservice.
# Contoh jika semua microservice di-deploy di Replit:
#   AUTH_SERVICE_URL = "https://nama-replit-kamu.replit.app/auth"
[vars]
PAGE_SERVICE_URL  = "https://page.laodeaksar.eu.org"
AUTH_SERVICE_URL  = "https://auth.laodeaksar.eu.org"
BLOCK_SERVICE_URL = "https://block.laodeaksar.eu.org"
FILE_SERVICE_URL  = "https://file.laodeaksar.eu.org"

# Secrets JANGAN diisi di sini — gunakan wrangler secret atau .dev.vars:
#
#   Production (Cloudflare):
#     pnpm exec wrangler secret put JWT_SECRET
#     pnpm exec wrangler secret put DATABASE_URL
#
#   Local dev (.dev.vars — sudah di-gitignore):
#     Salin apps/api-gateway/.dev.vars.example → .dev.vars lalu isi nilainya.

# ── Module Rules ──────────────────────────────────────────────────────────────
# Memungkinkan wrangler mem-bundle openapi.yaml sebagai Text module saat deploy.
# Dengan ini, import statis seperti `import yaml from '../openapi.yaml'`
# akan bekerja di Workers (file dibundel sebagai string saat build time).
[[rules]]
type        = "Text"
globs       = ["**/*.yaml"]
fallthrough = false
