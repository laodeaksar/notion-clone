# Secrets JANGAN diisi di sini — gunakan wrangler secret atau .dev.vars:
#
#   Production (Cloudflare):
#     pnpm exec wrangler secret put JWT_SECRET
#     pnpm exec wrangler secret put DATABASE_URL
#     pnpm exec wrangler secret put UPSTASH_REDIS_REST_URL
#     pnpm exec wrangler secret put UPSTASH_REDIS_REST_TOKEN
#
#   Local dev (.dev.vars — sudah di-gitignore):
#     Salin apps/api-gateway/.dev.vars.example → .dev.vars lalu isi nilainya.
#     Tanpa UPSTASH_REDIS_REST_URL/TOKEN, rate limiting otomatis pakai in-memory fallback.

# ── Module Rules ──────────────────────────────────────────────────────────────
[[rules]]
type        = "Text"
globs       = ["**/*.yaml"]
fallthrough = false
