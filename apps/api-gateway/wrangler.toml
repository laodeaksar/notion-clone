name = "notion-clone-api-gateway"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ──────────────────────────────────────────────────────────────────────────────
# CARA DEPLOY:
#
#   1. Install wrangler:        pnpm add -D wrangler  (di dalam apps/api-gateway)
#   2. Login ke Cloudflare:     pnpm exec wrangler login
#   3. Set JWT secret:          pnpm exec wrangler secret put JWT_SECRET
#   4. Deploy:                  pnpm exec wrangler deploy
#
# CATATAN PENTING - Service URLs:
#   Cloudflare Workers tidak bisa menjangkau `localhost`.
#   Isi [vars] di bawah dengan URL publik dari microservices kamu
#   (misalnya URL Replit yang sudah di-deploy, atau layanan terpisah).
# ──────────────────────────────────────────────────────────────────────────────

[vars]
PAGE_SERVICE_URL  = "https://GANTI-DENGAN-URL-PAGE-SERVICE"
AUTH_SERVICE_URL  = "https://GANTI-DENGAN-URL-AUTH-SERVICE"
BLOCK_SERVICE_URL = "https://GANTI-DENGAN-URL-BLOCK-SERVICE"
FILE_SERVICE_URL  = "https://GANTI-DENGAN-URL-FILE-SERVICE"

# JWT_SECRET jangan diisi di sini — simpan sebagai secret:
#   pnpm exec wrangler secret put JWT_SECRET

[build]
command = ""

[[rules]]
type = "ESModule"
globs = ["**/*.ts"]
