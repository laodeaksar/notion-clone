name = "notion-clone-api-gateway"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ══════════════════════════════════════════════════════════════════════════════
# CARA DEPLOY KE CLOUDFLARE WORKERS
# ══════════════════════════════════════════════════════════════════════════════
#
# Jalankan perintah di bawah ini dari folder apps/api-gateway/:
#
#   1. Login ke Cloudflare:
#        pnpm exec wrangler login
#
#   2. Simpan secrets (jangan ditulis di file ini):
#        pnpm exec wrangler secret put JWT_SECRET
#        pnpm exec wrangler secret put DATABASE_URL
#        pnpm exec wrangler secret put UPSTASH_REDIS_REST_URL
#        pnpm exec wrangler secret put UPSTASH_REDIS_REST_TOKEN
#
#      Dapatkan UPSTASH_REDIS_REST_URL dan UPSTASH_REDIS_REST_TOKEN dari:
#        https://console.upstash.com → buat database Redis baru → salin REST URL & Token
#
#   3. Edit bagian [vars] di bawah — isi URL publik microservices kamu.
#
#   4. Deploy:
#        pnpm exec wrangler deploy
#
# ══════════════════════════════════════════════════════════════════════════════

# ── Environment Variables ─────────────────────────────────────────────────────
# Cloudflare Workers tidak bisa menjangkau `localhost`.
# Ganti nilai di bawah dengan URL publik dari setiap microservice.
[vars]
PAGE_SERVICE_URL  = "https://GANTI-DENGAN-URL-PAGE-SERVICE"
AUTH_SERVICE_URL  = "https://GANTI-DENGAN-URL-AUTH-SERVICE"
BLOCK_SERVICE_URL = "https://GANTI-DENGAN-URL-BLOCK-SERVICE"
FILE_SERVICE_URL  = "https://GANTI-DENGAN-URL-FILE-SERVICE"

# Secrets JANGAN diisi di sini — gunakan wrangler secret atau .dev.vars:
#
#   Production (Cloudflare):
#     pnpm exec wrangler secret put JWT_SECRET
#     pnpm exec wrangler secret put DATABASE_URL
#     pnpm exec wrangler secret put UPSTASH_REDIS_REST_URL
#     pnpm exec wrangler secret put UPSTASH_REDIS_REST_TOKEN
#
#   Local dev (.dev.vars — sudah di-gitignore):
#     Salin apps/api-gateway/.dev.vars.example → .dev.vars lalu isi nilainya.
#     Tanpa UPSTASH_REDIS_REST_URL/TOKEN, rate limiting otomatis pakai in-memory fallback.

# ── Module Rules ──────────────────────────────────────────────────────────────
[[rules]]
type        = "Text"
globs       = ["**/*.yaml"]
fallthrough = false
