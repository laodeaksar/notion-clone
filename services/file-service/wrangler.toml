name = "file-service"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ── Cloudflare Queue ───────────────────────────────────────────────────────────
# Before deploying, create the queues:
#   wrangler queues create file-events
#   wrangler queues create file-events-dlq   # dead-letter queue
#
[[queues.producers]]
binding = "EVENTS_QUEUE"
queue   = "file-events"

[[queues.consumers]]
queue             = "file-events"
max_batch_size    = 10
max_batch_timeout = 5
max_retries       = 3
dead_letter_queue = "file-events-dlq"

# ── Vars (non-sensitive) ───────────────────────────────────────────────────────
# Set your Cloudinary cloud name here (not sensitive — appears in public URLs).
# [vars]
# CLOUDINARY_CLOUD_NAME = "your-cloud-name"

# ── Secrets ────────────────────────────────────────────────────────────────────
# Set before deploying:
#   wrangler secret put CLOUDINARY_CLOUD_NAME
#   wrangler secret put CLOUDINARY_API_KEY
#   wrangler secret put CLOUDINARY_API_SECRET
#   wrangler secret put JWT_SECRET
#   wrangler secret put DATABASE_URL
#   wrangler secret put INTERNAL_SECRET   ← must match the gateway's INTERNAL_SECRET
