openapi: 3.0.3
info:
  title: File Service
  version: 0.3.0
paths:
  /upload/quota:
    get:
      summary: Get storage quota usage for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Quota information for the current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaResult'
        '400':
          description: Quota fetch failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /upload:
    get:
      summary: List files in Cloudinary with optional folder filtering and cursor pagination
      security:
        - bearerAuth: []
      parameters:
        - name: folder
          in: query
          required: false
          schema:
            type: string
          description: Filter by folder prefix (e.g. "notion-clone")
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Pagination cursor returned from a previous response
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Maximum number of items to return
      responses:
        '200':
          description: Paginated list of files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResult'
        '400':
          description: List failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Upload a file to Cloudinary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: The actual file to upload
                filename:
                  type: string
                  description: Override the stored filename / Cloudinary public ID suffix
                folder:
                  type: string
                  description: Folder prefix in Cloudinary (defaults to "notion-clone")
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: string
                  description: Base64-encoded file content (with or without data URI prefix)
                filename:
                  type: string
                  description: Optional filename / Cloudinary public ID suffix
                folder:
                  type: string
                  description: Optional folder prefix in Cloudinary (defaults to "notion-clone")
      responses:
        '200':
          description: Uploaded file metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '400':
          description: Upload failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Storage quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /upload/{publicId}:
    get:
      summary: Get metadata for a single file by its Cloudinary public ID
      security:
        - bearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
          description: The full Cloudinary public ID (e.g. "notion-clone/my-file")
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
        '404':
          description: Object not found in Cloudinary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      summary: Rename or move a file to a new Cloudinary public ID
      security:
        - bearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
          description: Current Cloudinary public ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newKey:
                  type: string
                  description: Full replacement public ID — takes precedence over folder/filename (e.g. "archive/photo")
                folder:
                  type: string
                  description: Change the folder prefix, keep the existing filename
                filename:
                  type: string
                  description: Change the filename, keep the existing folder
              minProperties: 1
      responses:
        '200':
          description: File moved — returns new location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoveResult'
        '404':
          description: Source object not found in Cloudinary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Move failed or invalid body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a file from Cloudinary by its public ID
      security:
        - bearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
          description: The full Cloudinary public ID (e.g. "notion-clone/my-file")
      responses:
        '200':
          description: File deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResult'
        '404':
          description: Object not found in Cloudinary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UploadResult:
      type: object
      required: [url, publicId, provider, size, name, contentType]
      properties:
        url:
          type: string
          description: Public URL of the uploaded file
        publicId:
          type: string
          description: Cloudinary public ID
        provider:
          type: string
          enum: [cloudinary]
        size:
          type: integer
          description: File size in bytes
        name:
          type: string
          description: Original filename
        contentType:
          type: string
          description: MIME type of the uploaded file

    DeleteResult:
      type: object
      required: [publicId, deleted]
      properties:
        publicId:
          type: string
        deleted:
          type: boolean
          enum: [true]

    MoveResult:
      type: object
      required: [oldPublicId, publicId, url, provider]
      properties:
        oldPublicId:
          type: string
          description: The original Cloudinary public ID before the move
        publicId:
          type: string
          description: The new Cloudinary public ID after the move
        url:
          type: string
          description: Public URL of the file at its new location
        provider:
          type: string
          enum: [cloudinary]

    FileListItem:
      type: object
      required: [publicId, url, size, uploadedAt]
      properties:
        publicId:
          type: string
          description: Cloudinary public ID
        url:
          type: string
          description: Public URL of the file
        size:
          type: integer
          description: File size in bytes
        uploadedAt:
          type: string
          format: date-time

    FileMetadata:
      type: object
      required: [publicId, url, size, uploadedAt]
      properties:
        publicId:
          type: string
          description: Cloudinary public ID
        url:
          type: string
          description: Public URL of the file
        size:
          type: integer
          description: File size in bytes
        uploadedAt:
          type: string
          format: date-time
        contentType:
          type: string
          nullable: true
          description: MIME type detected at upload time

    ListResult:
      type: object
      required: [items, folder, truncated, cursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FileListItem'
        folder:
          type: string
          nullable: true
          description: Folder prefix used to filter results
        truncated:
          type: boolean
          description: Whether more items are available
        cursor:
          type: string
          nullable: true
          description: Pass this value as the `cursor` query param to fetch the next page

    QuotaResult:
      type: object
      required: [userId, usedBytes, limitBytes, availableBytes]
      properties:
        userId:
          type: string
          description: ID of the authenticated user
        usedBytes:
          type: integer
          description: Total bytes currently used by the user
        limitBytes:
          type: integer
          description: Maximum bytes allowed for the user
        availableBytes:
          type: integer
          description: Remaining bytes before the quota is reached

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
