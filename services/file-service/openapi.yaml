openapi: 3.0.3
info:
  title: File Service
  version: 0.2.0
paths:
  /upload:
    get:
      summary: List files in R2 with optional folder filtering and cursor pagination
      security:
        - bearerAuth: []
      parameters:
        - name: folder
          in: query
          required: false
          schema:
            type: string
          description: Filter by folder prefix (e.g. "notion-clone")
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Pagination cursor returned from a previous response
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Maximum number of items to return
      responses:
        '200':
          description: Paginated list of files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResult'
        '400':
          description: List failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Upload a file to R2
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: The actual file to upload
                filename:
                  type: string
                  description: Override the stored filename / R2 key suffix
                folder:
                  type: string
                  description: Folder prefix inside the bucket (defaults to "notion-clone")
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: string
                  description: Base64-encoded file content (with or without data URI prefix)
                filename:
                  type: string
                  description: Optional filename / R2 object key suffix
                folder:
                  type: string
                  description: Optional folder prefix inside the bucket (defaults to "notion-clone")
      responses:
        '200':
          description: Uploaded file metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '400':
          description: Upload failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /upload/{publicId}:
    get:
      summary: Get metadata for a single file by its R2 key
      security:
        - bearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
          description: The full R2 object key (e.g. "notion-clone/my-file.png")
      responses:
        '200':
          description: File metadata (no object body downloaded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
        '404':
          description: Object not found in R2
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a file from R2 by its publicId key
      security:
        - bearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
          description: The full R2 object key (e.g. "notion-clone/my-file.png")
      responses:
        '200':
          description: File deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResult'
        '404':
          description: Object not found in R2
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UploadResult:
      type: object
      properties:
        url:
          type: string
          description: Public URL of the uploaded file
        publicId:
          type: string
          description: R2 object key
        provider:
          type: string
          enum: [r2]

    DeleteResult:
      type: object
      properties:
        publicId:
          type: string
        deleted:
          type: boolean
          enum: [true]

    FileListItem:
      type: object
      properties:
        publicId:
          type: string
          description: R2 object key
        url:
          type: string
          description: Public URL of the file
        size:
          type: integer
          description: File size in bytes
        uploadedAt:
          type: string
          format: date-time

    FileMetadata:
      type: object
      properties:
        publicId:
          type: string
          description: R2 object key
        url:
          type: string
          description: Public URL of the file
        size:
          type: integer
          description: File size in bytes
        uploadedAt:
          type: string
          format: date-time
        contentType:
          type: string
          nullable: true
          description: MIME type detected at upload time

    ListResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FileListItem'
        folder:
          type: string
          nullable: true
          description: Folder prefix used to filter results
        truncated:
          type: boolean
          description: Whether more items are available
        cursor:
          type: string
          nullable: true
          description: Pass this value as the `cursor` query param to fetch the next page

    Error:
      type: object
      properties:
        error:
          type: string
