openapi: 3.0.3
info:
  title: File Service
  version: 0.2.0
paths:
  /upload:
    post:
      summary: Upload a file to R2
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: string
                  description: Base64-encoded file content (with or without data URI prefix)
                filename:
                  type: string
                  description: Optional filename / R2 object key suffix
                folder:
                  type: string
                  description: Optional folder prefix inside the bucket (defaults to "notion-clone")
      responses:
        '200':
          description: Uploaded file metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '400':
          description: Upload failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /upload/{publicId}:
    delete:
      summary: Delete a file from R2 by its publicId key
      security:
        - bearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
          description: The full R2 object key (e.g. "notion-clone/my-file.png")
      responses:
        '200':
          description: File deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResult'
        '404':
          description: Object not found in R2
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UploadResult:
      type: object
      properties:
        url:
          type: string
          description: Public URL of the uploaded file
        publicId:
          type: string
          description: R2 object key
        provider:
          type: string
          enum: [r2]

    DeleteResult:
      type: object
      properties:
        publicId:
          type: string
        deleted:
          type: boolean
          enum: [true]

    Error:
      type: object
      properties:
        error:
          type: string
