name = "auth-service"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Secrets — set these with wrangler CLI before deploying:
#   wrangler secret put DATABASE_URL       — Neon / Postgres connection string
#   wrangler secret put BETTER_AUTH_SECRET — random secret for signing sessions
#   wrangler secret put ALLOWED_ORIGINS    — comma-separated list of allowed origins
#
# For Cloudflare Hyperdrive (wraps external Postgres over TCP), add:
#   [[hyperdrive]]
#   binding = "HYPERDRIVE"
#   id = "<your-hyperdrive-id>"
