name = "hocuspocus-proxy"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Secrets — set with wrangler CLI before deploying:
#   wrangler secret put HOCUSPOCUS_BACKEND_URL
#     e.g. https://your-replit-vm.replit.app
#
# The worker proxies all traffic (HTTP + WebSocket) to the backend
# hocuspocus Node.js server. WebSocket real-time collaboration works
# as long as the backend server is reachable.
